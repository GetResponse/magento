stages:
  - install_dependencies
  - quality
  - test

composer_install:php72:
  image: magento/magento-cloud-docker-php:7.2-cli-1.3.5
  stage: install_dependencies
  tags:
    - hq1-small-amd64
  before_script:
    - composer config platform.php 7.2.34
  script:
    - composer self-update --2
    - composer config -a -g http-basic.repo.magento.com $COMPOSER_REPO_MAGENTO_USERNAME $COMPOSER_REPO_MAGENTO_PASSWORD
    - composer config --no-interaction audit.block-insecure false
    - composer install --prefer-dist --verbose
  artifacts:
    paths:
      - vendor/
    expire_in: 2 hrs

phpcs:
  needs: ['composer_install:php72']
  image: magento/magento-cloud-docker-php:7.2-cli-1.3.5
  stage: quality
  tags:
    - hq1-small-amd64
  script:
    - echo "📊 Running PHPCS with Magento2 standard..."
    - composer phpcs
  allow_failure: true
  dependencies:
    - composer_install:php72

phpcs-fixer:
  needs: ['composer_install:php72']
  image: magento/magento-cloud-docker-php:7.2-cli-1.3.5
  stage: quality
  tags:
    - hq1-small-amd64
  script:
    - echo "🔍 Running PHP CS Fixer..."
    - composer cs-check
  allow_failure: true
  dependencies:
    - composer_install:php72


test:phpunit:php72:
  needs: ['composer_install:php72']
  image: magento/magento-cloud-docker-php:7.2-cli-1.3.5
  stage: test
  tags:
    - hq1-small-amd64
  script:
    - ./vendor/bin/phpunit --testsuite unit --configuration ./Test/phpunit8.xml --colors=never
  dependencies:
    - composer_install:php72

composer_install:php83:
  image: magento/magento-cloud-docker-php:8.3-cli-1.3.7
  stage: install_dependencies
  tags:
    - hq1-small-amd64
  before_script:
    - docker-php-ext-enable sodium
  script:
    - composer config -a -g http-basic.repo.magento.com $COMPOSER_REPO_MAGENTO_USERNAME $COMPOSER_REPO_MAGENTO_PASSWORD
    - composer install --prefer-dist --verbose
  artifacts:
    paths:
      - vendor/

test:phpunit:php83:
  needs: [ 'composer_install:php83' ]
  image: magento/magento-cloud-docker-php:8.3-cli-1.3.7
  stage: test
  tags:
    - hq1-small-amd64
  before_script:
    - docker-php-ext-enable sodium
  script:
    - ./vendor/bin/phpunit --testsuite unit --configuration ./Test/phpunit9.xml --colors=never
  dependencies:
    - composer_install:php83

